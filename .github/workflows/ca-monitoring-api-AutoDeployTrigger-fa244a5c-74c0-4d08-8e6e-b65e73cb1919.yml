name: Deploy monitoring API to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CAMONITORINGAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CAMONITORINGAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CAMONITORINGAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login acrmonitoringapi.azurecr.io -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build and deploy Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile
          imageToBuild: acrmonitoringapi.azurecr.io/monitoring-api:${{ github.sha }}
          containerAppName: ca-monitoring-api
          resourceGroup: rg-database-services
          registryUrl: acrmonitoringapi.azurecr.io
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
          targetPort: 5000
          ingress: external
          disableTelemetry: true
