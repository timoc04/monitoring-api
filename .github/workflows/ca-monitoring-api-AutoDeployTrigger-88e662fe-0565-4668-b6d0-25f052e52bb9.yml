name: Trigger auto deployment for ca-monitoring-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CAMONITORINGAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CAMONITORINGAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CAMONITORINGAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and deploy Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile
          containerAppName: ca-monitoring-api
          resourceGroup: rg-database-services
          acrName: acrmonitoringapi
          registryUrl: acrmonitoringapi.azurecr.io
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
          disableTelemetry: true
